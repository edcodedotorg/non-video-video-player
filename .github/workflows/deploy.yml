name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Pages folder
        run: |
          mkdir -p pages

          cp index.html pages/
          cp json-video.js pages/
          cp json-video-styles.js pages/
          cp video-exporter.js pages/
          cp tailwind.js pages/
          cp -r examples pages/

          mkdir -p pages/node_modules/@ffmpeg/ffmpeg/dist/esm
          cp -r node_modules/@ffmpeg/ffmpeg/dist/esm/* pages/node_modules/@ffmpeg/ffmpeg/dist/esm/

          mkdir -p pages/node_modules/@ffmpeg/util/dist/esm
          cp -r node_modules/@ffmpeg/util/dist/esm/* pages/node_modules/@ffmpeg/util/dist/esm/

          mkdir -p pages/node_modules/@ffmpeg/core/dist/esm
          cp -r node_modules/@ffmpeg/core/dist/esm/* pages/node_modules/@ffmpeg/core/dist/esm/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          force_orphan: true
